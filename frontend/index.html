<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Security Lab</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-vulnerable"> <div class="top-bar">
        <span id="modeLabel">VULNERABLE</span>
        <label class="switch">
            <input type="checkbox" id="modeToggle">
            <span class="slider round"></span>
        </label>
    </div>

    <div class="container">
        <h2>Hệ Thống Xác Thực</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Tên đăng nhập hoặc Email:</label>
                <input type="text" id="username" placeholder="Nhập username hoặc email..." required>
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu...">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe" style="margin:0; font-weight: normal;">Remember Me</label>
            </div>
            
            <button type="submit" id="loginBtn">Đăng nhập hệ thống</button>
            
            <div class="divider"><span>HOẶC</span></div>
            
            <button type="button" id="ssoBtn" class="sso-btn">Đăng nhập bằng Google</button>
        </form>
        
        <div id="messageBox" class="message hidden"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
