<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Auth Lab</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <h2>Hệ Thống Đăng Nhập</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Tên đăng nhập:</label>
                <input type="text" id="username" placeholder="Nhập username..." required minlength="3">
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu..." required minlength="5">
            </div>
            <button type="submit" id="loginBtn">Đăng nhập</button>
        </form>
        
        <div id="messageBox" class="message hidden"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
