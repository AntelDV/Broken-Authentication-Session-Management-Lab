<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Xác Thực Đa Lớp</title>
    <link rel="stylesheet" href="vendor/fontawesome/css/all.min.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="theme-vulnerable">
    <div class="top-bar">
      <div class="brand">
        <i class="fas fa-shield-alt"></i> Quản Trị Trung Tâm
      </div>
      <div class="switch-container">
        <span id="modeLabel"
          ><i class="fas fa-exclamation-triangle"></i> Cảnh Báo</span
        >
        <label class="switch">
          <input type="checkbox" id="modeToggle" />
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <div class="container fade-in">
      <div id="loginSection">
        <h2>Đăng Nhập Hệ Thống</h2>
        <form id="loginForm">
          <div class="input-group">
            <label><i class="fas fa-user"></i> Tên đăng nhập / Email</label>
            <input
              type="text"
              id="username"
              placeholder="Nhập tài khoản của bạn..."
              required
            />
          </div>
          <div class="input-group">
            <label><i class="fas fa-lock"></i> Mật khẩu</label>
            <input
              type="password"
              id="password"
              placeholder="Nhập mật khẩu..."
              required
            />
          </div>
          <div class="options-group">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe" /> Ghi nhớ phiên
            </label>
            <a href="#" id="showForgotBtn" class="link-btn">Quên mật khẩu?</a>
          </div>
          <button type="submit" class="btn-primary" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Đăng nhập
          </button>

          <div class="divider"><span>HOẶC TÍCH HỢP</span></div>
          <button type="button" class="btn-outline" id="ssoBtn">
            <i class="fab fa-google"></i> Tiếp tục với Google (SSO)
          </button>
        </form>
      </div>

      <div id="mfaSection" class="hidden">
        <h2>Xác Minh Bảo Mật (MFA)</h2>
        <p class="subtitle">
          Tài khoản của bạn được bảo vệ 2 lớp.<br />Vui lòng nhập mã từ ứng dụng
          Authenticator.
        </p>
        <form id="mfaForm">
          <div class="input-group">
            <input
              type="text"
              id="otpCode"
              placeholder="000 000"
              maxlength="6"
              style="
                text-align: center;
                font-size: 32px;
                letter-spacing: 8px;
                font-weight: bold;
              "
              required
              autocomplete="off"
            />
          </div>
          <button type="submit" class="btn-primary" id="mfaBtn">
            <i class="fas fa-check-circle"></i> Xác nhận mã OTP
          </button>
          <button type="button" class="btn-text mt-20" id="backToLoginFromMfa">
            <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
          </button>
        </form>
      </div>

      <div id="forgotSection" class="hidden">
        <h2>Khôi Phục Mật Khẩu</h2>
        <p class="subtitle">
          Nhập Tên đăng nhập hoặc Email để nhận liên kết đặt lại mật khẩu an
          toàn.
        </p>
        <form id="forgotForm">
          <div class="input-group">
            <label><i class="fas fa-envelope"></i> Định danh tài khoản</label>
            <input
              type="text"
              id="forgotUsername"
              placeholder="Nhập định danh..."
              required
            />
          </div>
          <button type="submit" class="btn-primary" id="sendResetBtn">
            <i class="fas fa-paper-plane"></i> Gửi liên kết
          </button>
          <button type="button" class="btn-text mt-20" id="backToLoginBtn">
            <i class="fas fa-arrow-left"></i> Trở về
          </button>
        </form>
      </div>

      <div id="messageBox" class="message hidden"></div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
