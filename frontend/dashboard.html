<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Security Lab</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-vulnerable">

    <div class="top-bar">
        <span id="modeLabelDashboard">VULNERABLE</span>
        </div>

    <div class="container" style="max-width: 900px;"> <h2>Khu Vực Báo Cáo dữ liệu</h2>
        
        <div class="message success" id="welcomeMsg" style="font-size: 20px;">
            Đang tải...
        </div>

        <div class="data-panel panel-vuln">
            <h3>Thông tin Session ID </h3>
            <code id="sessionDisplay">N/A</code>
        </div>

        <div class="data-panel panel-vuln">
            <h3>Cookie Ghi nhớ </h3>
            <code id="rememberDisplay">N/A</code>
        </div>

        <div class="data-panel panel-secure">
            <h3>JWT Access Token</h3>
            <code id="jwtRawDisplay" style="color: #ea4335; word-break: break-all;">N/A</code>
        </div>

        <div class="data-panel panel-secure">
            <h3>Giải mã JWT </h3>
            <pre><code id="jwtDecodedDisplay" style="color: #49cc90; font-weight: bold;">N/A</code></pre>
        </div>

        <button id="testAdminBtn">Test gọi API Admin check quyền JWT)</button>
        <div id="adminDataBox" class="data-panel hidden"></div>

        <button id="logoutBtn" style="margin-top: 30px;">Đăng xuất</button>
    </div>

    <script src="js/app.js"></script>
    <script>document.addEventListener('DOMContentLoaded', loadDashboardData);</script>
</body>
</html>
